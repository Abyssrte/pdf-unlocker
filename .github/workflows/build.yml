name: Build PDF Unlocker APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git zip unzip wget openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential libltdl-dev python3-pip python3-dev

    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.33
        pip install buildozer
        pip install pypdf
        pip install Pillow

    - name: Generate app icon
      run: python3 generate_icon.py

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'SPEC'
        [app]
        title = PDF Unlocker
        package.name = pdfunlocker
        package.domain = org.pdfunlocker
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy==2.3.0,pypdf
        orientation = portrait
        fullscreen = 0
        icon.filename = %(source.dir)s/logo.png
        android.permissions = READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE
        android.api = 33
        android.minapi = 21
        android.ndk = 25b
        android.accept_sdk_license = True
        android.archs = arm64-v8a, armeabi-v7a
        [buildozer]
        log_level = 2
        warn_on_root = 1
        SPEC

    - name: Build APK
      run: yes | buildozer android debug 2>&1
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PDFUnlocker-APK
        path: bin/*.apk
        retention-days: 30

    - name: Build summary
      run: |
        echo "BUILD COMPLETE!"
        ls -lh bin/*.apk 2>/dev/null || echo "No APK found"
        echo "Download from Actions tab - PDFUnlocker-APK artifact"
        
