name: Build PDF Unlocker APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

    # ── 1. Checkout ───────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Setup Python ───────────────────────────────────────────────────────
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ── 3. System packages ────────────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip wget \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          build-essential libltdl-dev \
          python3-pip python3-dev

    # ── 4. Java ───────────────────────────────────────────────────────────────
    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    # ── 5. Python packages ────────────────────────────────────────────────────
    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.33
        pip install buildozer
        pip install pypdf
        pip install Pillow

    # ── 6. Auto-generate logo.png ─────────────────────────────────────────────
    - name: Generate app icon
      run: |
        python3 << 'PYEOF'
        import os
        from PIL import Image, ImageDraw

        LOGO = "logo.png"

        if os.path.exists(LOGO):
            print("✅ Using existing logo.png")
        else:
            print("⚙️ Generating blue lock icon...")
            SIZE = 512
            img  = Image.new("RGBA", (SIZE, SIZE), (0, 0, 0, 0))
            draw = ImageDraw.Draw(img)
            BG    = (24, 119, 242)
            DARK  = (10, 80, 180)
            WHITE = (255, 255, 255)
            cx, cy = SIZE // 2, SIZE // 2

            # Background circles
            draw.ellipse([0, 0, SIZE, SIZE], fill=BG)
            draw.ellipse([18, 18, SIZE-18, SIZE-18], fill=DARK)
            draw.ellipse([32, 32, SIZE-32, SIZE-32], fill=BG)

            # Shackle
            SW, ST = 110, 28
            sx = cx - SW // 2
            sy = cy - 80
            draw.rectangle([sx, sy+40, sx+ST, cy-20], fill=WHITE)
            draw.rectangle([sx+SW-ST, sy+40, sx+SW, cy-20], fill=WHITE)
            draw.arc([sx, sy, sx+SW, sy+int(SW*0.9)], start=180, end=0, fill=WHITE, width=ST)

            # Lock body
            BW, BH = 180, 150
            bx, by = cx - BW//2, cy - 20
            draw.rounded_rectangle([bx, by, bx+BW, by+BH], radius=22, fill=WHITE)

            # Keyhole
            KR = 26
            draw.ellipse([cx-KR, by+40, cx+KR, by+40+KR*2], fill=BG)
            draw.rectangle([cx-12, by+40+KR, cx+12, by+40+KR*2+24], fill=BG)

            img.save(LOGO, "PNG")
            print("✅ logo.png generated!")
        PYEOF

    # ── 7. Create buildozer.spec ──────────────────────────────────────────────
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = PDF Unlocker
package.name = pdfunlocker
package.domain = org.pdfunlocker

source.dir = .
source.include_exts = py,png,jpg,kv,atlas

version = 1.0

requirements = python3,kivy==2.3.0,pypdf

orientation = portrait
fullscreen = 0

icon.filename = %(source.dir)s/logo.png

android.permissions = READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.ndk = 25b
android.accept_sdk_license = True
android.archs = arm64-v8a, armeabi-v7a

[buildozer]
log_level = 2
warn_on_root = 1
EOF
        echo "✅ buildozer.spec created"

    # ── 8. Build APK ──────────────────────────────────────────────────────────
    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    # ── 9. Upload APK ─────────────────────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PDFUnlocker-APK
        path: bin/*.apk
        retention-days: 30

    # ── 10. Summary ───────────────────────────────────────────────────────────
    - name: Build summary
      run: |
        echo "================================"
        echo "  BUILD COMPLETE!"
        ls -lh bin/*.apk 2>/dev/null || echo "No APK found - check errors above"
        echo "================================"
        echo "Download APK: Actions tab → PDFUnlocker-APK artifact"
        
